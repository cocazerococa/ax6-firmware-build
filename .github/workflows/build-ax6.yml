name: 红米AX6 NSS满血固件编译

on:
  workflow_dispatch:
    inputs:
      release:
        description: '编译完成后发布到 Release'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: write

env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt
  REPO_BRANCH: main
  CONFIG_FILE: .config
  DIY_SH: diy.sh
  TZ: Asia/Shanghai
  GIT_TERMINAL_PROMPT: 0

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet \
            /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force 2>/dev/null || true
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
            fastjar flex gawk gettext gcc-multilib g++-multilib git gperf \
            haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip \
            p7zip-full patch pkgconf python3 python3-pyelftools \
            python3-setuptools qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
            xmlto xxd zlib1g-dev
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir && sudo chown $USER:$GROUPS /workdir

      - name: 克隆 VIKINGYFY NSS 源码
        working-directory: /workdir
        run: |
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 执行 DIY 脚本
        run: |
          chmod +x $DIY_SH
          cd openwrt && $GITHUB_WORKSPACE/$DIY_SH

      - name: 更新并安装 feeds
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          cd openwrt
          ./scripts/feeds update -a 2>&1 | tee /tmp/feeds_update.log || true
          # 检查关键 feed 是否成功
          for feed in passwall openclash; do
            if [ ! -d "feeds/$feed" ]; then
              echo "⚠️ $feed feed 未克隆成功，跳过"
            else
              echo "✅ $feed feed 正常"
            fi
          done
          ./scripts/feeds install -a

      - name: 加载自定义配置
        run: |
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          cd openwrt && make defconfig

      - name: 下载编译依赖
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 编译固件
        id: compile
        run: |
          cd openwrt
          echo "▶ $(nproc) 线程编译..."
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          echo "FILE_DATE=$(date +"%Y%m%d_%H%M")" >> $GITHUB_ENV

      - name: 查找固件路径
        id: findbin
        if: steps.compile.outputs.status == 'success'
        run: |
          BIN_PATH=$(find openwrt/bin/targets -name "*sysupgrade*" | head -1 | xargs dirname 2>/dev/null || echo "")
          [ -z "$BIN_PATH" ] && BIN_PATH=$(find openwrt/bin/targets -type d | tail -1)
          echo "BIN_DIR=${BIN_PATH}" >> $GITHUB_OUTPUT
          echo "固件目录: $BIN_PATH" && ls -lh $BIN_PATH/ 2>/dev/null || true

      - name: 上传 Artifacts
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: AX6-NSS-stock-${{ env.FILE_DATE }}
          path: ${{ steps.findbin.outputs.BIN_DIR }}/
          retention-days: 7

      - name: 生成 Release 标签
        id: tag
        if: steps.compile.outputs.status == 'success' && github.event.inputs.release == 'true'
        run: |
          echo "release_tag=AX6-NSS-stock-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: 红米AX6 NSS固件(stock) ${{ steps.tag.outputs.release_tag }}
          body: |
            | 项目 | 内容 |
            |---|---|
            | 设备 | redmi,ax6-stock（无需扩容）|
            | NSS | 满血加速 |
            | 插件 | PassWall / HomeProxy / OpenClash / SmartDNS / mosdns / AdGuard Home / DDNS / WOL / frp / Lucky / iStore |
            | 默认IP | 192.168.100.1 |
            | 默认密码 | password |
          files: ${{ steps.findbin.outputs.BIN_DIR }}/*
